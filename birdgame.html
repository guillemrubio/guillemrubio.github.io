<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦜 Mystery Bird Quiz</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); max-width: 450px; width: 90%; text-align: center; }
        #bird-img { width: 100%; height: 280px; object-fit: cover; border-radius: 12px; display: none; margin-bottom: 1.5rem; transition: filter 0.5s ease; }
        .blur { filter: blur(30px) grayscale(1); }
        h1 { color: #2c3e50; font-size: 1.5rem; }
        .controls { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 10px; }
        button { border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1rem; }
        .btn-next { background: #3498db; color: white; }
        .btn-reveal { background: #27ae60; color: white; }
        #audio-player { width: 100%; margin: 1rem 0; }
        #bird-name { font-size: 1.4rem; font-weight: 700; color: #2c3e50; margin: 10px 0; min-height: 1.6em; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card">
    <h1>Guess the Bird</h1>
    <div id="loader" class="loader"></div>
    <div id="bird-name">??????</div>
    <audio id="audio-player" controls></audio>
    <img id="bird-img" class="blur" src="" alt="Bird Photo">
    
    <div class="controls">
        <button class="btn-reveal" onclick="reveal()">Reveal Answer</button>
        <button class="btn-next" onclick="fetchNewBird()">Next Random Bird</button>
    </div>
</div>

<script>
    const birdImg = document.getElementById('bird-img');
    const birdName = document.getElementById('bird-name');
    const audioPlayer = document.getElementById('audio-player');
    const loader = document.getElementById('loader');

    // Using AllOrigins proxy - much more reliable for browsers
    const PROXY = "https://api.allorigins.win/get?url=";

    async function fetchNewBird() {
        loader.style.display = 'block';
        birdImg.style.display = 'none';
        birdImg.classList.add('blur');
        birdName.innerText = "??????";
        
        try {
            // 1. Fetch from Xeno-Canto via Proxy
            const targetUrl = encodeURIComponent("https://xeno-canto.org/api/2/recordings?query=cnt:spain+q:A");
            const response = await fetch(`${PROXY}${targetUrl}`);
            const wrapper = await response.json();
            
            // The actual JSON is inside wrapper.contents as a string
            const data = JSON.parse(wrapper.contents);
            
            if (!data.recordings || data.recordings.length === 0) throw new Error("No birds found");

            const bird = data.recordings[Math.floor(Math.random() * data.recordings.length)];
            const name = bird.en;

            // 2. Set Audio
            audioPlayer.src = bird.file.startsWith("https:") ? bird.file : "https:" + bird.file;
            birdName.dataset.answer = name;

            // 3. Fetch Image from Wiki
            const imgUrl = await getWikiImage(name) || await getWikiImage(`${bird.gen} ${bird.sp}`);
            if (imgUrl) {
                birdImg.src = imgUrl;
                birdImg.style.display = 'block';
            }
        } catch (error) {
            console.error("Fetch error:", error);
            birdName.innerText = "Error: Check Console (F12)";
        }
        loader.style.display = 'none';
    }

    async function getWikiImage(term) {
        const url = `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=pageimages&generator=search&gsrsearch=${encodeURIComponent(term)}&gsrlimit=1&piprop=original`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            const pageId = Object.keys(data.query.pages)[0];
            return data.query.pages[pageId].original?.source || null;
        } catch { return null; }
    }

    function reveal() {
        birdImg.classList.remove('blur');
        birdName.innerText = birdName.dataset.answer;
    }

    fetchNewBird();
</script>
</body>
</html>
