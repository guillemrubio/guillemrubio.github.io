<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦜 Pro Bird Master Quiz</title>
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --error: #e74c3c; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 95%; max-width: 550px; text-align: center; }
        
        #status-msg { color: #64748b; margin-bottom: 1rem; font-style: italic; min-height: 1.5em; }
        
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .option { background: #fff; border: 2px solid #e2e8f0; border-radius: 16px; cursor: pointer; transition: 0.3s; overflow: hidden; padding: 0; display: flex; flex-direction: column; position: relative; }
        .option:hover:not(:disabled) { border-color: var(--primary); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .option img { width: 100%; height: 150px; object-fit: cover; background: #eee; }
        .option-label { padding: 10px; font-weight: 700; font-size: 0.9rem; background: #fff; width: 100%; }
        
        .correct { border-color: var(--success) !important; background: #f0fff4 !important; }
        .wrong { border-color: var(--error) !important; background: #fff5f5 !important; }
        
        #credit-line { font-size: 0.75rem; color: #94a3b8; margin-top: 10px; visibility: hidden; }
        .system-btn { width: 100%; margin-top: 20px; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; display: none; font-size: 1.1rem; }
        
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 10px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        audio { width: 100%; border-radius: 30px; }
    </style>
</head>
<body>

<div class="card">
    <h1 id="header">Whose song is this? 🎶</h1>
    <div id="loader" class="loader"></div>
    <div id="status-msg">Click "Start" to Load Birds</div>
    
    <audio id="audio-player" controls></audio>

    <div id="options" class="options-grid"></div>
    
    <div id="credit-line">Photo: <span id="author">...</span> | <span id="license">...</span></div>
    
    <button id="start-btn" onclick="initGame()" class="system-btn" style="display:block;">Start Game</button>
    <button id="next-btn" onclick="nextRound()" class="system-btn">Next Bird ➔</button>
</div>

<script>
    const PROXY = "https://api.allorigins.win/get?url=";
    const ALLOWED_LICENSES = ["cc-by", "cc-by-sa", "pd", "public domain", "cc0", "cc-zero"];
    const DENIED_KEYWORDS = ["-nc", "nc-", "/nc/", "-nd", "nd-", "/nd/"];

    const audioPlayer = document.getElementById('audio-player');
    const optionsDiv = document.getElementById('options');
    const statusMsg = document.getElementById('status-msg');
    const loader = document.getElementById('loader');
    const nextBtn = document.getElementById('next-btn');
    const creditLine = document.getElementById('credit-line');

    let birdPool = [];
    let currentAnswer = "";

    async function initGame() {
        document.getElementById('start-btn').style.display = 'none';
        loader.style.display = 'block';
        statusMsg.innerText = "Politely fetching bird data...";

        try {
            const target = encodeURIComponent("https://xeno-canto.org/api/2/recordings?query=cnt:spain+q:A");
            const res = await fetch(`${PROXY}${target}`);
            const data = await res.json();
            const json = JSON.parse(data.contents);
            birdPool = json.recordings.filter(b => b.en !== "");
            nextRound();
        } catch (e) {
            statusMsg.innerText = "Connection failed. Check your browser/proxy.";
            console.error(e);
        }
        loader.style.display = 'none';
    }

    async function nextRound() {
        nextBtn.style.display = 'none';
        creditLine.style.visibility = 'hidden';
        optionsDiv.innerHTML = "";
        loader.style.display = 'block';
        statusMsg.innerText = "Searching for legal images...";

        // Pick a subset to find a valid round
        const shuffled = [...birdPool].sort(() => 0.5 - Math.random());
        const choices = shuffled.slice(0, 4);
        const correct = choices[0];
