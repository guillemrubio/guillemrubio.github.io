<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦜 Mystery Bird Quiz</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 400px; text-align: center; }
        #bird-img { width: 100%; height: 250px; object-fit: cover; border-radius: 10px; display: none; margin-bottom: 20px; }
        .blur { filter: blur(25px); }
        .btn-box { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        .next { background: #3498db; color: white; }
        .reveal { background: #2ecc71; color: white; }
        audio { width: 100%; margin: 15px 0; }
        #status-msg { margin: 10px 0; color: #7f8c8d; font-style: italic; min-height: 24px; }
        #bird-name { font-size: 22px; font-weight: bold; margin-bottom: 10px; min-height: 30px; }
    </style>
</head>
<body>

<div class="card">
    <div id="bird-name">???</div>
    <div id="status-msg">Click Next to Start</div>
    
    <audio id="audio-player" controls></audio>
    <img id="bird-img" class="blur" src="">
    
    <div class="btn-box">
        <button class="reveal" onclick="reveal()">Reveal Answer</button>
        <button class="next" onclick="fetchNewBird()">Next Random Bird</button>
    </div>
</div>

<script>
    const birdImg = document.getElementById('bird-img');
    const birdName = document.getElementById('bird-name');
    const audioPlayer = document.getElementById('audio-player');
    const statusMsg = document.getElementById('status-msg');

    // Robust proxy to bypass CORS
    const PROXY = "https://api.allorigins.win/get?url=";

    async function fetchNewBird() {
        statusMsg.innerText = "Searching for a bird...";
        birdImg.style.display = 'none';
        birdImg.classList.add('blur');
        birdName.innerText = "???";
        
        try {
            // Encode the Xeno-Canto URL for the proxy
            const targetUrl = encodeURIComponent("https://xeno-canto.org/api/2/recordings?query=cnt:france+q:A");
            const response = await fetch(`${PROXY}${targetUrl}`);
            
            if (!response.ok) throw new Error("Proxy connection failed");
            
            const wrapper = await response.json();
            const data = JSON.parse(wrapper.contents); // AllOrigins wraps the JSON in a string
            
            if (!data.recordings || data.recordings.length === 0) {
                throw new Error("No birds found in this region");
            }

            const bird = data.recordings[Math.floor(Math.random() * data.recordings.length)];
            
            // Set Audio (Direct link usually works for audio tags without proxy)
            audioPlayer.src = "https:" + bird.file;
            birdName.dataset.answer = bird.en;

            // Fetch Image
            statusMsg.innerText = "Fetching image...";
            const img = await getWikiImage(bird.en) || await getWikiImage(`${bird.gen} ${bird.sp}`);
            
            if (img) {
                birdImg.src = img;
                birdImg.style.display = 'block';
            }

            statusMsg.innerText = "Ready! Listen to the audio.";

        } catch (error) {
            console.error(error);
            statusMsg.innerText = "Error: " + error.message;
        }
    }

    async function getWikiImage(term) {
        const wikiUrl = `https://en.wikipedia.org/w/api.php?action=query&format=json&origin=*&prop=pageimages&generator=search&gsrsearch=${encodeURIComponent(term)}&gsrlimit=1&piprop=original`;
        try {
            const res = await fetch(wikiUrl);
            const data = await res.json();
            const pageId = Object.keys(data.query.pages)[0];
            return data.query.pages[pageId].original?.source;
        } catch {
            return null;
        }
    }

    function reveal() {
        birdImg.classList.remove('blur');
        birdName.innerText = birdName.dataset.answer;
        statusMsg.innerText = "It's a " + birdName.dataset.answer + "!";
    }
</script>

</body>
</html>
